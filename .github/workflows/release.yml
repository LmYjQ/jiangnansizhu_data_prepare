name: Release

on:
  push:
    tags:
      - "v*"  # Trigger on tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: ""
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: jianpu_annotator_tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: jianpu_annotator_tauri
        run: npm ci

      - name: Build Tauri app
        working-directory: jianpu_annotator_tauri
        run: npm run tauri build
        env:
          CARGO_INCREMENTAL: 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jianpu-annotator-${{ matrix.platform }}
          path: |
            jianpu_annotator_tauri/src-tauri/target/release/bundle/**
            jianpu_annotator_tauri/src-tauri/target/release/jianpu-annotator*
          if-no-files-found: error

  create-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
