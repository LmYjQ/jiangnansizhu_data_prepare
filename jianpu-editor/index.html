<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>简谱编辑器</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>简谱编辑器</h1>

      <div class="toolbar">
        <div class="toolbar-group">
          <label>曲名: <input type="text" id="title-input" value="未命名" /></label>
          <label>速度: <input type="number" id="tempo-input" value="60" min="30" max="200" /> BPM</label>
          <label>拍数: <input type="number" id="beats-input" value="4" min="2" max="8" /></label>
        </div>
        <div class="toolbar-group">
          <button id="btn-mode">编辑模式</button>
          <button id="btn-add-note">添加音符</button>
          <button id="btn-add-bar">添加小节线</button>
          <button id="btn-add-space">添加空格</button>
          <button id="btn-clear">清空</button>
        </div>
        <div class="toolbar-group">
          <button id="btn-undo">撤销</button>
          <button id="btn-redo">重做</button>
        </div>
        <div class="toolbar-group">
          <button id="btn-export-json">导出JSON</button>
          <button id="btn-export-png">导出PNG</button>
          <button id="btn-export-midi">导出MIDI</button>
        </div>
      </div>

      <div class="editor-panel">
        <div class="canvas-container">
          <canvas id="score-canvas" width="800" height="1000"></canvas>
          <div class="canvas-controls">
            <button id="btn-page-up">上一页</button>
            <span id="page-info">第 1 / 1 页</span>
            <button id="btn-page-down">下一页</button>
            <input type="range" id="scroll-bar" min="0" max="0" style="display:none" />
          </div>
        </div>
        <div class="note-panel">
          <h3>音符属性</h3>
          <div id="note-editing" class="note-editing">
            <p>请选择或添加音符</p>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <div class="shortcuts">
          <span class="shortcut-title">快捷键:</span>
          <span>0-7</span>音符
          <span class="sep">|</span>
          <span>空格</span>空格
          <span class="sep">|</span>
          <span>x</span>小节线
          <span class="sep">|</span>
          <span>.</span>附点
          <span class="sep">|</span>
          <span>b</span>板/切换
          <span class="sep">|</span>
          <span>y</span>眼
          <span class="sep">|</span>
          <span>↑↓</span>八度
          <span class="sep">|</span>
          <span>←→</span>时值/选择
        </div>
        <span id="status-msg">就绪</span>
      </div>
    </main>
  </body>
</html>
